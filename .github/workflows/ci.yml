name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Demo app (Spring Boot 4.1 M4, Java 21) ──────────────────────────
  build-demo-app:
    name: Demo App — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      # Spring Boot 4.1.0-M4 is a milestone — not on Maven Central
      - name: Add Spring milestone repository
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'XML'
          <settings>
            <profiles>
              <profile>
                <id>spring-milestones</id>
                <repositories>
                  <repository>
                    <id>spring-milestones</id>
                    <url>https://repo.spring.io/milestone</url>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>spring-milestones</id>
                    <url>https://repo.spring.io/milestone</url>
                    <snapshots><enabled>false</enabled></snapshots>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>spring-milestones</activeProfile>
            </activeProfiles>
          </settings>
          XML

      - name: Build and test
        env:
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          ACCESS_TOKEN_TTL: 900
          REFRESH_TOKEN_TTL: 2592000
          AUTH_ENFORCE: false
          DUFFEL_API_KEY: ${{ secrets.DUFFEL_API_KEY }}
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-app-test-results
          path: target/surefire-reports/

  # ── Job 2: Book-scanner frontend (Angular 21, Node 22) ─────────────────────
  build-frontend:
    name: Book Scanner — Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book-scanner/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: book-scanner/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: book-scanner/frontend/dist/
          retention-days: 7
