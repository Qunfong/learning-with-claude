name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Auth server / demo app (Spring Boot 4.1 M4, Java 21) ───────────
  build-demo-app:
    name: Auth Server — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-server

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      # Spring Boot 4.1.0-M4 is a milestone — not on Maven Central
      - name: Add Spring milestone repository
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'XML'
          <settings>
            <profiles>
              <profile>
                <id>spring-milestones</id>
                <repositories>
                  <repository>
                    <id>spring-milestones</id>
                    <url>https://repo.spring.io/milestone</url>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>spring-milestones</id>
                    <url>https://repo.spring.io/milestone</url>
                    <snapshots><enabled>false</enabled></snapshots>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>spring-milestones</activeProfile>
            </activeProfiles>
          </settings>
          XML

      - name: Build and test
        env:
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          ACCESS_TOKEN_TTL: 900
          REFRESH_TOKEN_TTL: 2592000
          AUTH_ENFORCE: false
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: demo-app-test-results
          path: auth-server/target/surefire-reports/

  # ── Job 2: Book-scanner backend (Spring Boot 4.0.5, Java 25) ──────────────
  build-backend:
    name: Book Scanner — Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book-scanner/backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bookscanner
          POSTGRES_USER: bookscanner
          POSTGRES_PASSWORD: bookscanner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 25
        id: setup-java
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Configure Maven toolchains
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/toolchains.xml <<XML
          <toolchains>
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>25</version>
                <vendor>openjdk</vendor>
              </provides>
              <configuration>
                <jdkHome>${{ steps.setup-java.outputs.path }}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          XML

      - name: Install Tesseract
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-nld

      - name: Build and test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/bookscanner
          SPRING_DATASOURCE_USERNAME: bookscanner
          SPRING_DATASOURCE_PASSWORD: bookscanner
          TESSDATA_PATH: /usr/share/tessdata
          TESSDATA_LANG: eng+nld
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: book-scanner/backend/target/surefire-reports/

  # ── Job 3: Book-scanner frontend (Angular 21, Node 22) ─────────────────────
  build-frontend:
    name: Book Scanner — Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: book-scanner/frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: book-scanner/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: book-scanner/frontend/dist/
          retention-days: 7
