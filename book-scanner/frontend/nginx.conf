server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─── API proxy naar backend ────────────────────────────────────────────────
    # Alle /api/* calls worden doorgestuurd naar de backend container.
    # Dit voorkomt CORS problemen: de browser praat alleen met nginx (poort 80).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE vereist dat buffering UIT staat — anders ontvangt de client
        # de events pas als de buffer vol is (grote vertraging!)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ─── Angular SPA routing ──────────────────────────────────────────────────
    # Alle andere requests gaan naar index.html zodat Angular's router
    # kan werken bij directe URL-navigatie (bijv. /books/123)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
